{% extends "base.html" %}

{% block title %}Password Reset - Nutrify{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    {% include "_flash_messages.html" %}
    <section class="surface-panel rounded-3xl p-6 sm:p-8">
        <p class="text-sm font-semibold uppercase tracking-[0.14em] text-green-700">Password Reset</p>
        <h1 class="mt-2 text-3xl font-bold text-gray-900">Generate a reset link</h1>
        <form method="POST" class="mt-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700" for="identifier">Username or Email</label>
                <input id="identifier" name="identifier" type="text" required class="mt-3 block w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-green-500 focus:ring-green-500">
            </div>
            <div class="flex justify-end">
                <button type="submit" class="inline-flex rounded-xl bg-green-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-green-700">Generate Reset Link</button>
            </div>
        </form>
        {% if reset_link %}
            <div class="mt-8 rounded-2xl border border-green-200 bg-green-50 p-4">
                <p class="text-sm font-semibold text-green-800">Reset link</p>
                <a href="{{ reset_link }}" class="mt-2 block break-all text-sm font-medium text-green-700 hover:text-green-800">{{ reset_link }}</a>
            </div>
        {% endif %}
    </section>
</div>
{% endblock %}
