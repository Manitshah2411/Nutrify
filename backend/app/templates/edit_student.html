{% extends "base.html" %}

{% block title %}Edit Student - {{ user.student_detail.full_name }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-900">Edit Student Details</h1>
        <p class="mt-1 text-gray-600">You are editing the profile for <span class="font-semibold">{{ user.student_detail.full_name }}</span>.</p>

        <div class="mt-8 border-t border-gray-200 pt-8">
            <form action="{{ url_for('main.edit_student', user_id=user.id) }}" method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="full_name" class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" name="full_name" id="full_name" value="{{ user.student_detail.full_name }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="roll_no" class="block text-sm font-medium text-gray-700">Roll No.</label>
                        <input type="number" name="roll_no" id="roll_no" value="{{ user.student_detail.roll_no }}" min="1" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="dob" class="block text-sm font-medium text-gray-700">Date of Birth</label>
                        <input type="date" name="dob" id="dob" value="{{ user.student_detail.dob.isoformat() }}" max="{{ max_student_dob.isoformat() }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="sex" class="block text-sm font-medium text-gray-700">Sex</label>
                        <select name="sex" id="sex" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                            <option {% if user.student_detail.sex == 'Male' %}selected{% endif %}>Male</option>
                            <option {% if user.student_detail.sex == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                    <div>
                        <label for="grade" class="block text-sm font-medium text-gray-700">Grade</label>
                        <input type="number" name="grade" id="grade" value="{{ user.student_detail.grade }}" min="1" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="section" class="block text-sm font-medium text-gray-700">Section</label>
                        <input type="text" name="section" id="section" value="{{ user.student_detail.section }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div class="md:col-span-2">
                        <label for="password" class="block text-sm font-medium text-gray-700">New Password (Optional)</label>
                        <input type="password" name="password" id="password" placeholder="Leave blank to keep current password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>

                <div class="flex items-center space-x-4 pt-5">
                    <button type="submit" class="inline-flex justify-center py-2 px-6 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700">
                        Save Changes
                    </button>
                    <a href="{{ url_for('main.dashboard') }}" class="py-2 px-6 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
