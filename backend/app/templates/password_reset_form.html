{% extends "base.html" %}

{% block title %}Reset Password - Nutrify{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    {% include "_flash_messages.html" %}
    <section class="surface-panel rounded-3xl p-6 sm:p-8">
        <p class="text-sm font-semibold uppercase tracking-[0.14em] text-green-700">Password Reset</p>
        <h1 class="mt-2 text-3xl font-bold text-gray-900">Set a new password</h1>
        {% if token_valid %}
            <form method="POST" class="mt-8 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700" for="new_password">New Password</label>
                    <input id="new_password" name="new_password" type="password" minlength="8" required class="mt-3 block w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-green-500 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700" for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="8" required class="mt-3 block w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:border-green-500 focus:ring-green-500">
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="inline-flex rounded-xl bg-green-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-green-700">Reset Password</button>
                </div>
            </form>
        {% else %}
            <p class="mt-6 text-sm text-gray-600">This reset link can no longer be used.</p>
        {% endif %}
    </section>
</div>
{% endblock %}
